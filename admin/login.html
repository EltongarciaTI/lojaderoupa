<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ModeMan Admin</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="brand">Mode<span>Man</span></div>
        <p>Painel Administrativo</p>
      </div>
      <div class="login-divider"></div>

      <div class="login-error" id="loginError">Senha incorreta. Tente novamente.</div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="senha">Senha de acesso</label>
          <div class="input-password">
            <input type="password" id="senha" class="form-control" placeholder="Digite sua senha" autofocus required />
            <button type="button" class="toggle-pass" id="togglePass" aria-label="Ver senha">
              <svg id="eyeIcon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div style="height:6px"></div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          Entrar
        </button>
      </form>

      <div style="margin-top:20px;text-align:center">
        <a href="../index.html" style="font-size:0.78rem;color:var(--text-muted)">← Voltar para a loja</a>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Redirecionar se já estiver logado
      if (sessionStorage.getItem('mm_admin_ok') === '1') {
        window.location.href = 'index.html';
      }

      // Toggle senha
      document.getElementById('togglePass').addEventListener('click', () => {
        const input = document.getElementById('senha');
        input.type = input.type === 'password' ? 'text' : 'password';
      });

      // Login form
      document.getElementById('loginForm').addEventListener('submit', e => {
        e.preventDefault();
        const senha = document.getElementById('senha').value;
        const senhaCorreta = localStorage.getItem('mm_admin_pass') || 'admin123';
        if (senha === senhaCorreta) {
          sessionStorage.setItem('mm_admin_ok', '1');
          window.location.href = 'index.html';
        } else {
          document.getElementById('loginError').classList.add('show');
          document.getElementById('senha').value = '';
          document.getElementById('senha').focus();
        }
      });
    });
  </script>
</body>
</html>
